<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- tailwindcss + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/tailwind.config.js">
</head>

<body>
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-8 lg:px-12">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <img src="./assets/github-logo.png" alt="logo" class="w-10 h-10 object-contain">
                    <h1 class="text-xl font-bold text-slate-800">GitHub Issues Tracker</h1>
                </div>

                <div class="flex items-center gap-4">
                    <div class="relative hidden md:flex items-center">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-500 z-10"></i>
                
                        <input type="text" placeholder="Search issues..."
                            class="input input-bordered h-10 w-64 bg-slate-50 pl-10 focus:bg-white focus:outline-[#6000FF] border-gray-300" />
                    </div>
                
                    <button
                        class="btn bg-[#6000FF] hover:bg-[#5000D2] border-none text-white px-5 h-10 min-h-[40px] normal-case font-semibold">
                        <i class="fa-solid fa-plus mr-1"></i> New Issue
                    </button>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
